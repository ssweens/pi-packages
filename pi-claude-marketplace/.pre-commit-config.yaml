exclude: ^(\.claude/|tests/domain/fixtures/hash-stability/)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=64"]
        exclude: ^(package-lock\.json|\.planning/)
      - id: check-json
        exclude: ^tests/orchestrators/marketplace/_fixtures/invalid-manifest/
      - id: check-yaml
      - id: check-ast
      - id: sort-simple-yaml
      - id: check-vcs-permalinks
      - id: forbid-submodules
      - id: forbid-new-submodules

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: '\.(js|json|ts)$'

  - repo: https://github.com/sirosen/texthooks
    rev: 0.7.1
    hooks:
      - id: fix-smartquotes
      - id: alphabetize-codeowners
      - id: fix-spaces
      - id: fix-unicode-dashes
      - id: fix-ligatures
      - id: forbid-bidi-controls

  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.92.4
    hooks:
      - id: trufflehog

  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
        args: ["-d", "{extends: default, rules: {line-length: disable, document-start: disable, truthy: disable}}"]

  - repo: https://github.com/google/yamlfmt
    rev: v0.20.0
    hooks:
      - id: yamlfmt

  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm
          - mdformat-gfm-alerts
        exclude: ^(tests/fixtures/|tests/bridges/_fixtures/|\.planning/)

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.20.0
    hooks:
      - id: markdownlint-cli2
        exclude: ^(tests/fixtures/|tests/bridges/_fixtures/|\.planning/)

  - repo: local
    hooks:
      - id: npm-lint
        name: npm lint
        entry: npm run lint
        language: system
        pass_filenames: false
        files: '^(eslint\.config\.js|extensions/.*\.ts|package(-lock)?\.json)$'
      - id: npm-format-check
        name: npm format check
        entry: npm run format:check
        language: system
        pass_filenames: false
        files: '^(eslint\.config\.js|extensions/.*\.ts|package(-lock)?\.json|tsconfig\.json)$'
      - id: npm-typecheck
        name: npm typecheck
        entry: npm run typecheck
        language: system
        pass_filenames: false
        files: '^(extensions/.*\.ts|package(-lock)?\.json|tsconfig\.json)$'
