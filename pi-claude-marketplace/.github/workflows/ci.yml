name: CI

on:
  push:
    branches:
      - main
      - features/**
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# D-01: single-Node-version matrix. Node 24 only -- the latest stable LTS line
# at the time of Phase 1 planning. Justification (per CONTEXT.md):
#   - Node 24 satisfies write-file-atomic@^8's `^22.22.2 || ^24.15.0 || >=26.0.0`
#     engine floor.
#   - Node 24 supports native TS strip (no `tsx`, no `--experimental-strip-types`).
#   - Multi-version matrix maintenance overhead is not justified for V1.
#
# Note: ROADMAP.md Phase 1 success criterion 5 originally specified Node
# 22/24/26. D-01 supersedes that with single-version Node 24. If a future
# audit reopens this, add `node-version: [22, 24, 26]` and a `strategy.matrix`
# block; the rest of the workflow is matrix-ready.

jobs:
  check:
    name: npm run check (Node 24)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run full check pipeline
        # NFR-6: typecheck + ESLint + Prettier + node:test
        run: npm run check

  integration-tests:
    name: integration tests (Node 24)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration

  e2e-tests:
    name: pinned e2e tests (Node 24)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run pinned e2e tests
        run: npm run test:e2e

  package:
    name: package manifest
    needs: [check, integration-tests, e2e-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate package manifest
        run: npm pack --dry-run

  publish:
    # Only publish on version tags after tests and package validation pass.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [package]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    environment:
      name: npm
      url: https://www.npmjs.com/package/pi-claude-marketplace
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Publish to npm
        run: npm publish --access public --provenance
